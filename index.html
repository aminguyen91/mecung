<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>🌈 Mê Cung Kumon</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--pink:#FF6B9D;--yellow:#FFD93D;--green:#6BCB77;--blue:#4D96FF;--purple:#C77DFF;--orange:#FF9A3C;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Fredoka One',cursive;}
body{background:linear-gradient(135deg,#FF6B9D 0%,#FFD93D 35%,#6BCB77 65%,#4D96FF 100%);background-size:300% 300%;animation:bgAnim 10s ease infinite;display:flex;flex-direction:column;align-items:center;touch-action:none;}
@keyframes bgAnim{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.screen{display:none;width:100%;height:100vh;flex-direction:column;align-items:center;}
.screen.active{display:flex;}

/* HOME */
#homeScreen{justify-content:flex-start;padding:12px 14px;gap:12px;}
.home-logo{font-size:clamp(22px,6vw,40px);color:#fff;text-shadow:2px 3px 0 rgba(0,0,0,0.13);text-align:center;line-height:1.2;}
.home-logo small{display:block;font-size:0.48em;opacity:.9;margin-top:2px;}
.stars-bar{background:rgba(255,255,255,.92);border-radius:40px;padding:8px 22px;font-size:clamp(16px,4.5vw,22px);color:var(--pink);box-shadow:0 3px 12px rgba(0,0,0,.13);}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:460px;overflow-y:auto;flex:1;padding:2px 0 8px;}
.card{background:#fff;border-radius:18px;padding:12px 10px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;box-shadow:0 3px 14px rgba(0,0,0,.11);border:3px solid transparent;transition:transform .13s;}
.card:active{transform:scale(.93);}
.card .ico{font-size:clamp(22px,7vw,34px);}
.card .ttl{font-size:clamp(10px,3vw,13px);color:#333;text-align:center;line-height:1.3;}
.badge{padding:3px 9px;border-radius:18px;color:#fff;font-size:10px;font-family:'Nunito',sans-serif;font-weight:800;}
.easy{background:#6BCB77}.medium{background:#4D96FF}.hard{background:#FF6B9D}
.cstars{font-size:13px;letter-spacing:2px;}

/* GAME */
#gameScreen{justify-content:flex-start;}
.hdr{width:100%;max-width:520px;display:flex;align-items:center;justify-content:space-between;padding:8px 12px 5px;background:rgba(255,255,255,.93);backdrop-filter:blur(8px);}
.hdr-l{display:flex;align-items:center;gap:7px;}
.btnhome{background:var(--yellow);border:none;border-radius:12px;padding:7px 13px;font-family:'Fredoka One',cursive;font-size:17px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.13);}
.btnhome:active{transform:scale(.91);}
.mname{font-size:clamp(12px,3.2vw,16px);color:#222;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hdr-r{display:flex;align-items:center;gap:7px;}
.sbadge{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;padding:5px 11px;border-radius:18px;font-size:13px;}
.pdots{display:flex;gap:4px;}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(0,0,0,.14);}
.dot.done{background:var(--green);}
.dot.cur{background:var(--orange);transform:scale(1.45);}

.hint{width:100%;max-width:520px;text-align:center;padding:3px 8px;font-size:clamp(11px,3vw,13px);color:rgba(255,255,255,.95);font-family:'Nunito',sans-serif;font-weight:800;text-shadow:0 1px 3px rgba(0,0,0,.2);}

.cwrap{position:relative;width:100%;max-width:520px;flex:1;min-height:0;overflow:hidden;display:flex;align-items:center;justify-content:center;}
#mazeBg{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;pointer-events:none;user-select:none;}
#dc{position:absolute;inset:0;width:100%;height:100%;}

.ctrls{width:100%;max-width:520px;display:flex;gap:7px;padding:8px 12px;background:rgba(255,255,255,.93);backdrop-filter:blur(8px);}
.cbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:11px 4px;border:none;border-radius:15px;font-family:'Fredoka One',cursive;font-size:clamp(12px,3.5vw,15px);cursor:pointer;box-shadow:0 2px 7px rgba(0,0,0,.11);transition:transform .12s;}
.cbtn:active{transform:scale(.92);}
.cu{background:linear-gradient(135deg,#FFD93D,#FF9A3C);color:#fff;}
.cc{background:linear-gradient(135deg,#FF6B9D,#C77DFF);color:#fff;}
.cd{background:linear-gradient(135deg,#6BCB77,#4D96FF);color:#fff;}

/* WIN */
#wo{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:18px;}
#wo.show{display:flex;}
.wbox{background:#fff;border-radius:28px;padding:26px 20px;text-align:center;max-width:300px;width:100%;animation:popIn .42s cubic-bezier(.175,.885,.32,1.275);}
@keyframes popIn{from{transform:scale(.35) rotate(-10deg);opacity:0}to{transform:scale(1);opacity:1}}
.wem{font-size:64px;display:block;margin-bottom:2px;}
.wtit{font-size:26px;background:linear-gradient(90deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.wstars{font-size:42px;margin:9px 0;letter-spacing:5px;}
.wmsg{font-family:'Nunito',sans-serif;font-size:13px;color:#666;margin-bottom:16px;line-height:1.5;}
.wbtns{display:flex;gap:9px;}
.wbtn{flex:1;padding:12px;border:none;border-radius:15px;font-family:'Fredoka One',cursive;font-size:15px;cursor:pointer;transition:transform .12s;}
.wbtn:active{transform:scale(.93);}
.wnxt{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;}
.whm{background:linear-gradient(135deg,var(--yellow),var(--orange));color:#fff;}

/* Float star */
.fs{position:fixed;pointer-events:none;z-index:200;font-size:30px;animation:fu 1.3s ease-out forwards;}
@keyframes fu{0%{transform:translateY(0) scale(1) rotate(0);opacity:1}100%{transform:translateY(-130px) scale(1.6) rotate(22deg);opacity:0}}
</style>
</head>
<body>

<div id="homeScreen" class="screen active">
  <div class="home-logo">🌈 Mê Cung Kumon<small>Vẽ đường đến đích nào! ✏️</small></div>
  <div class="stars-bar">⭐ Tổng sao: <span id="tsd">0</span></div>
  <div class="grid" id="grid"></div>
</div>

<div id="gameScreen" class="screen">
  <div class="hdr">
    <div class="hdr-l">
      <button class="btnhome" onclick="goHome()">🏠</button>
      <div class="mname" id="mn"></div>
    </div>
    <div class="hdr-r">
      <div class="pdots" id="pd"></div>
      <div class="sbadge">⭐<span id="ss">0</span></div>
    </div>
  </div>
  <div class="hint" id="hint">✏️ Vẽ đường từ mũi tên → đến ngôi sao ★</div>
  <div class="cwrap" id="cw">
    <img id="mazeBg" alt="maze"/>
    <canvas id="dc"></canvas>
  </div>
  <div class="ctrls">
    <button class="cbtn cu" onclick="undoS()">↩️ Quay lại</button>
    <button class="cbtn cc" onclick="clearA()">🗑️ Xóa hết</button>
    <button class="cbtn cd" onclick="checkD()">✅ Xong!</button>
  </div>
</div>

<div id="wo">
  <div class="wbox">
    <span class="wem" id="wem">🏆</span>
    <div class="wtit" id="wt">Xuất sắc!</div>
    <div class="wstars" id="ws">⭐⭐⭐</div>
    <div class="wmsg" id="wm">Bạn đã vẽ được đường ra!</div>
    <div class="wbtns">
      <button class="wbtn whm" onclick="goHome()">🏠 Trang chủ</button>
      <button class="wbtn wnxt" onclick="nextMaze()" id="bnxt">▶ Tiếp</button>
    </div>
  </div>
</div>

let cur=0, strokes=[], curS=null, drawing=false, sCnt=0, totalStars=+localStorage.getItem('ks')||0;
let mStars=JSON.parse(localStorage.getItem('kms')||'{}');

const canvas=document.getElementById('dc'), ctx=canvas.getContext('2d');
const bg=document.getElementById('mazeBg'), cw=document.getElementById('cw');

function resize(){
  const r=cw.getBoundingClientRect();
  canvas.width=r.width; canvas.height=r.height; redraw();
}
window.addEventListener('resize',resize);

function redraw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const lw=Math.max(6,canvas.width*.016);
  strokes.forEach((s,i)=>{
    if(s.length<2)return;
    const h=(i*53)%360;
    ctx.strokeStyle=`hsla(${h},88%,52%,.82)`;
    ctx.lineWidth=lw; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath(); ctx.moveTo(s[0].x,s[0].y);
    s.forEach(p=>ctx.lineTo(p.x,p.y)); ctx.stroke();
  });
  if(curS&&curS.length>=2){
    ctx.strokeStyle='rgba(255,70,140,.88)';
    ctx.lineWidth=lw+1; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath(); ctx.moveTo(curS[0].x,curS[0].y);
    curS.forEach(p=>ctx.lineTo(p.x,p.y)); ctx.stroke();
  }
}

function pos(e){
  const r=canvas.getBoundingClientRect();
  const s=e.touches?e.touches[0]:e;
  return{x:s.clientX-r.left,y:s.clientY-r.top};
}

canvas.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;curS=[pos(e)];redraw();},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault(); if(!drawing||!curS)return;
  const p=pos(e),l=curS[curS.length-1];
  if(Math.hypot(p.x-l.x,p.y-l.y)>3){curS.push(p);redraw();}
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(curS&&curS.length>1){strokes.push(curS);sCnt++;}
  curS=null;drawing=false;redraw();
});
canvas.addEventListener('mousedown',e=>{drawing=true;curS=[pos(e)];});
canvas.addEventListener('mousemove',e=>{if(!drawing||!curS)return;curS.push(pos(e));redraw();});
canvas.addEventListener('mouseup',()=>{if(curS&&curS.length>1){strokes.push(curS);sCnt++;}curS=null;drawing=false;redraw();});

function undoS(){if(strokes.length){strokes.pop();redraw();shake();}}
function clearA(){strokes=[];curS=null;sCnt=0;redraw();}
function shake(){
  canvas.style.transition='transform .05s';
  const sq=[5,-5,4,-4,2,-2,0];let i=0;
  const go=()=>{if(i<sq.length){canvas.style.transform=`translateX(${sq[i++]}px)`;setTimeout(go,50);}else canvas.style.transform='';};go();
}

function checkD(){
  const pts=strokes.reduce((s,st)=>s+st.length,0);
  let stars=1;
  if(pts>160&&sCnt<=7)stars=3;
  else if(pts>70)stars=2;
  showWin(stars);
}

function loadMaze(i){
  cur=i; strokes=[];curS=null;sCnt=0;
  const m=MAZES[i];
  bg.src='data:image/jpeg;base64,'+m.b64;
  document.getElementById('mn').textContent=m.emoji+' '+m.title;
  document.getElementById('ss').textContent=totalStars;
  document.getElementById('hint').textContent='✏️ Vẽ đường từ mũi tên → đến ngôi sao ★';
  const pd=document.getElementById('pd');
  pd.innerHTML='';
  MAZES.forEach((_,j)=>{
    const d=document.createElement('div');
    d.className='dot'+(j<i?' done':j===i?' cur':'');
    pd.appendChild(d);
  });
  bg.onload=()=>{resize();redraw();};
  if(bg.complete){resize();}
  showScr('gameScreen');
}

function goHome(){document.getElementById('wo').classList.remove('show');showScr('homeScreen');renderGrid();}
function nextMaze(){document.getElementById('wo').classList.remove('show');loadMaze((cur+1)%MAZES.length);}

function showWin(stars){
  const es=['🥳','🎊','🏆'],ts=['Cố gắng thêm!','Rất giỏi!','Xuất sắc!'];
  const ms=['Đến đích rồi! Thử lại để có thêm sao nhé 💪','Tuyệt vời! Vẽ đường rất khéo! 🎨','Hoàn hảo! Bạn thật xuất sắc! 🌟'];
  const idx=stars-1;
  document.getElementById('wem').textContent=es[idx];
  document.getElementById('wt').textContent=ts[idx];
  document.getElementById('ws').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('wm').textContent=ms[idx];
  const k=String(cur),prev=mStars[k]||0;
  if(stars>prev){totalStars+=(stars-prev);mStars[k]=stars;localStorage.setItem('ks',totalStars);localStorage.setItem('kms',JSON.stringify(mStars));document.getElementById('tsd').textContent=totalStars;document.getElementById('ss').textContent=totalStars;}
  document.getElementById('bnxt').style.display=cur<MAZES.length-1?'':'none';
  document.getElementById('wo').classList.add('show');
  spawnStars(stars);
}

function spawnStars(n){
  const ic=['⭐','🌟','✨','💫','🎉'];
  for(let i=0;i<n*5;i++){
    setTimeout(()=>{
      const e=document.createElement('div');e.className='fs';
      e.textContent=ic[Math.floor(Math.random()*ic.length)];
      e.style.left=(10+Math.random()*80)+'vw';e.style.top=(20+Math.random()*60)+'vh';
      document.body.appendChild(e);setTimeout(()=>e.remove(),1400);
    },i*95);
  }
}

function renderGrid(){
  const g=document.getElementById('grid');g.innerHTML='';
  document.getElementById('tsd').textContent=totalStars;
  MAZES.forEach((m,i)=>{
    const div=document.createElement('div');
    div.className='card';div.style.borderColor=m.color;
    const st=mStars[String(i)]||0;
    div.innerHTML=`<div class="ico">${m.emoji}</div><div class="ttl">${m.title}</div><div class="badge ${m.level}">${m.level==='easy'?'🌱 Dễ':m.level==='medium'?'🌿 Vừa':'🌳 Khó'}</div><div class="cstars">${st>0?'⭐'.repeat(st)+'☆'.repeat(3-st):'○○○'}</div>`;
    div.onclick=()=>loadMaze(i);
    g.appendChild(div);
  });
}

function showScr(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='gameScreen')setTimeout(resize,80);
}

renderGrid();
</script>
</body>
</html>
